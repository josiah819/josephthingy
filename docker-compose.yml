services:
  mediagrab:
    build: .
    image: mediagrab:latest
    container_name: mediagrab
    restart: unless-stopped
    ports:
      - "8080:8080"
    environment:
      - AUTO_UPDATE_YTDLP=true   # refresh yt-dlp on every container start
      - CLEANUP_HOURS=3          # finished files auto-delete after this
      - MAX_CONCURRENT=3         # simultaneous downloads
    volumes:
      - data:/data               # download scratch space
      - ./config:/config:ro      # drop cookies.txt here for logged-in sites

volumes:
  data:
